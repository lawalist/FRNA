<ion-header>
  <ion-toolbar>
    <ion-title>Base de données locale</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list lines="none">
    <ion-list-header>
      <ion-label>Tàches</ion-label>
    </ion-list-header>
    <ion-item>
      <ion-icon slot="start" color="medium" src='../assets/svgs/upload.svg'></ion-icon>
      <ion-label>Ajouter filtre local</ion-label>
    </ion-item>
    <ion-item>
      <ion-icon slot="start" color="medium" name="trash"></ion-icon>
      <ion-label>Vider la corbeille</ion-label>
    </ion-item>
    <ion-item>
      <ion-icon slot="start" (click)="destroyDBs()" color="danger" name="grid"></ion-icon>
      <ion-label>Réinitialiser la BD</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
