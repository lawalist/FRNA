<ion-list>
  <ion-item *ngIf="global.testerAccesMenu('departements')" button (click)="departement()" detail="true">
    <ion-label>{{'GENERAL.DEPARTEMENTS' | translate}}</ion-label>
  </ion-item>
  <ion-item *ngIf="global.testerAccesMenu('communes')" button (click)="commune()" detail="true">
    <ion-label>{{'GENERAL.COMMUNES' | translate}}</ion-label>
  </ion-item>
  <ion-item *ngIf="global.testerAccesMenu('localites')" button (click)="localite()" detail="true">
    <ion-label>{{'GENERAL.LOCALITES' | translate}}</ion-label>
  </ion-item>

  <ion-item *ngIf="global.testerAccesMenu('essais')" title="{{'GENERAL.ESSAIS' | translate}}" button (click)="choix('essais')" detail="true">
    <ion-label>{{'GENERAL.ESSAIS' | translate}}</ion-label>
  </ion-item>
</ion-list>
