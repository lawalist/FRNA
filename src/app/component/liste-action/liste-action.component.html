<ion-list>

    <ion-label>{{'GENERAL.MODIFIER' | translate}}</ion-label>
  </ion-item--> 

  <ion-item *ngIf="retournedAction == 'archives' && !monInstitution && !retournetLimite" title="{{'GENERAL.DESARCHIVER' | translate}}" button (click)="choix('desarchiver')">
    <ion-label>{{'GENERAL.DESARCHIVER' | translate}}</ion-label>
  </ion-item>
  
  <ion-item *ngIf="retournedAction == 'liste' && !monInstitution && !retournetLimite" title="{{'GENERAL.ARCHIVER' | translate}}" button (click)="choix('archiver')">
    <ion-label>{{'GENERAL.ARCHIVER' | translate}}</ion-label>
  </ion-item>

  <ion-item *ngIf="retournedAction == 'corbeille' && !monInstitution && !retournetLimite" title="{{'GENERAL.RESTAURER' | translate}}" button (click)="choix('restaurer')">
    <ion-label>{{'GENERAL.RESTAURER' | translate}}</ion-label>
  </ion-item>

  <ion-item *ngIf="retournedAction != 'corbeille' && !monInstitution && !localite && !retournetLimite" title="{{'GENERAL.PARTAGER' | translate}}" button (click)="choix('partager')">
    <ion-label>{{'GENERAL.PARTAGER' | translate}}</ion-label>
  </ion-item>

  <ion-item title="{{'GENERAL.DERNIERE_MODIFICATION' | translate}}" button (click)="choix('derniereModification')">
    <ion-label>{{'GENERAL.DERNIERE_MODIFICATION' | translate}}</ion-label>
  </ion-item>

  <ion-item title="{{'GENERAL.SUPPRIMER' | translate}}" *ngIf="retournedAction != 'archives'" button (click)="choix('supprimer')">
    <ion-label color="danger">{{'GENERAL.SUPPRIMER' | translate}}</ion-label>
  </ion-item>

  </ion-list>
